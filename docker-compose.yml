---
services:
  master:
    image: terule/dst-dedicated-server:latest
    container_name: dst-master
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${DST_SERVER_PORT:-10999}:${DST_SERVER_PORT:-10999}/udp"
    environment:
      # --- REQUIRED ---
      - DST_CLUSTER_TOKEN=${DST_CLUSTER_TOKEN:-}

      # --- Server Identity ---
      - DST_CLUSTER_NAME=${DST_CLUSTER_NAME:-DST Dedicated Server}
      - DST_CLUSTER_DESC=${DST_CLUSTER_DESC:-Multi-container DST server on Coolify!}
      - DST_CLUSTER_PASS=${DST_CLUSTER_PASS:-}
      - DST_CLUSTER_INTENTION=${DST_CLUSTER_INTENTION:-cooperative}

      # --- Gameplay ---
      - DST_GAME_MODE=${DST_GAME_MODE:-survival}
      - DST_MAX_PLAYERS=${DST_MAX_PLAYERS:-6}
      - DST_PVP=${DST_PVP:-false}
      - DST_PAUSE_WHEN_EMPTY=${DST_PAUSE_WHEN_EMPTY:-true}
      - DST_VOTE_ENABLED=${DST_VOTE_ENABLED:-true}
      - DST_TICK_RATE=${DST_TICK_RATE:-30}

      # --- Shard Configuration ---
      - DST_SHARD_MODE=Master
      - DST_CLUSTER_KEY=${DST_CLUSTER_KEY:-dst_cluster_secret_key}
      - DST_MASTER_PORT=${DST_MASTER_PORT:-10888}
      - DST_SERVER_PORT=${DST_SERVER_PORT:-10999}

      # --- Steam Workshop Mods (comma-separated IDs) ---
      - DST_MODS=${DST_MODS:-}

      # --- Maintenance ---
      - DST_AUTO_UPDATE=${DST_AUTO_UPDATE:-true}
    volumes:
      - dst-data:/data

  caves:
    image: terule/dst-dedicated-server:latest
    container_name: dst-caves
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      - master
    ports:
      - "${DST_CAVES_PORT:-11000}:${DST_CAVES_PORT:-11000}/udp"
    environment:
      # --- REQUIRED ---
      - DST_CLUSTER_TOKEN=${DST_CLUSTER_TOKEN:-}

      # --- Server Identity ---
      - DST_CLUSTER_NAME=${DST_CLUSTER_NAME:-DST Dedicated Server}
      - DST_CLUSTER_DESC=${DST_CLUSTER_DESC:-Multi-container DST server on Coolify!}
      - DST_CLUSTER_PASS=${DST_CLUSTER_PASS:-}
      - DST_CLUSTER_INTENTION=${DST_CLUSTER_INTENTION:-cooperative}

      # --- Gameplay ---
      - DST_GAME_MODE=${DST_GAME_MODE:-survival}
      - DST_MAX_PLAYERS=${DST_MAX_PLAYERS:-6}
      - DST_PVP=${DST_PVP:-false}
      - DST_PAUSE_WHEN_EMPTY=${DST_PAUSE_WHEN_EMPTY:-true}
      - DST_VOTE_ENABLED=${DST_VOTE_ENABLED:-true}
      - DST_TICK_RATE=${DST_TICK_RATE:-30}

      # --- Shard Configuration ---
      - DST_SHARD_MODE=Caves
      - DST_CLUSTER_KEY=${DST_CLUSTER_KEY:-dst_cluster_secret_key}
      - DST_MASTER_IP=master
      - DST_MASTER_PORT=${DST_MASTER_PORT:-10888}
      - DST_SERVER_PORT=${DST_CAVES_PORT:-11000}

      # --- Steam Workshop Mods (must match master) ---
      - DST_MODS=${DST_MODS:-}

      # --- Maintenance ---
      - DST_AUTO_UPDATE=${DST_AUTO_UPDATE:-true}
    volumes:
      - dst-data:/data

volumes:
  dst-data:
