name: "💡 Feature Request"
description: "Got a cool idea for this server image? Suggest it here."
title: "[FEATURE]: <short-description>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "Tell us what's missing or frustrating."
      placeholder: "I'm struggling with configuring customized world settings..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "How should this feature work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Did you try any other way or saw this in another image?"
